tissue:
  width: 2.0
  height: 0.4
  grid_size: 0.08
  n_zones: 5
  poisson_ratio: 0.45
  poisson_ratio_var: 0.005
  young_modulus_min: 0.002
  young_modulus_max: 0.02
  young_modulus_var: 0.0002

probe:
  num_points: 8
  radius: 0.05
  trajectories:
    type: []
    frames: []
    params: []

simulation:
  collision_spring_constant: 0.02
  steps: 500
  dt: 0.1
  learning_rate: 0.001
  adam_beta_1: 0.2
  adam_beta_2: 0.999
  warmup: true
  probe_force_noise_std: 0.0001
  observation_noise: 0.0
  frames: 0
  save_folder: ./data/sim_out
  save_vectors: true
  save_images: false
  save_video: false
  opaque_model: false
